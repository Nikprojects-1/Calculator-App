<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Premium scientific calculator with history, themes, and keyboard support">
  <title>Scientific Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="app-loader" id="appLoader" aria-hidden="true">
    <div class="loader-ring"></div>
    <span class="loader-text">Initializing</span>
  </div>

  <div class="app-background" aria-hidden="true"></div>

  <div class="app-container" id="appContainer">
    <header class="app-header">
      <div class="header-brand">
        <div class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="4" y="2" width="16" height="20" rx="2"/>
            <line x1="8" y1="6" x2="16" y2="6"/>
            <circle cx="8" cy="11" r="1" fill="currentColor"/>
            <circle cx="12" cy="11" r="1" fill="currentColor"/>
            <circle cx="16" cy="11" r="1" fill="currentColor"/>
            <circle cx="8" cy="15" r="1" fill="currentColor"/>
            <circle cx="12" cy="15" r="1" fill="currentColor"/>
            <circle cx="16" cy="15" r="1" fill="currentColor"/>
            <circle cx="8" cy="19" r="1" fill="currentColor"/>
            <circle cx="12" cy="19" r="1" fill="currentColor"/>
            <circle cx="16" cy="19" r="1" fill="currentColor"/>
          </svg>
        </div>
        <h1 class="app-title">Scientific Calculator</h1>
      </div>

      <div class="header-controls">
        <div class="angle-toggle" role="group" aria-label="Angle mode">
          <button type="button" class="angle-btn active" data-mode="deg" id="degBtn" title="Degrees">DEG</button>
          <button type="button" class="angle-btn" data-mode="rad" id="radBtn" title="Radians">RAD</button>
        </div>

        <label class="theme-select-wrapper" for="themeSelect">
          <span class="sr-only">Theme</span>
          <select id="themeSelect" class="theme-select" aria-label="Select theme">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
            <option value="neon">Neon</option>
            <option value="cyberpunk">Cyberpunk</option>
          </select>
        </label>

        <button type="button" class="icon-btn" id="historyToggle" title="Toggle history (H)" aria-label="Toggle history panel" aria-expanded="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 8v4l3 3"/>
            <circle cx="12" cy="12" r="9"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="main-layout">
      <aside class="history-sidebar" id="historySidebar" aria-label="Calculation history">
        <div class="sidebar-header glass-panel">
          <h2>History</h2>
          <button type="button" class="text-btn" id="clearHistoryBtn" title="Clear all history">Clear</button>
        </div>
        <ul class="history-list" id="historyList" role="list"></ul>
        <p class="history-empty" id="historyEmpty">No calculations yet</p>
      </aside>

      <section class="calculator-section">
        <div class="calculator-card glass-panel">
          <div class="display-area">
            <div class="display-meta">
              <span class="memory-indicator" id="memoryIndicator" hidden title="Memory stored">M</span>
              <span class="angle-indicator" id="angleIndicator">DEG</span>
            </div>
            <div class="expression-display" id="expressionDisplay" aria-live="polite">0</div>
            <div class="result-row">
              <output class="result-display" id="resultDisplay" for="expressionDisplay">0</output>
              <button type="button" class="copy-btn" id="copyBtn" title="Copy result (Ctrl+C)" aria-label="Copy result">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="9" y="9" width="13" height="13" rx="2"/>
                  <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                </svg>
                <span class="copy-feedback" id="copyFeedback">Copied!</span>
              </button>
            </div>
          </div>

          <div class="memory-row">
            <button type="button" class="mem-btn" data-action="memory-clear" title="Memory Clear">MC</button>
            <button type="button" class="mem-btn" data-action="memory-recall" title="Memory Recall">MR</button>
            <button type="button" class="mem-btn" data-action="memory-add" title="Memory Add">M+</button>
            <button type="button" class="mem-btn" data-action="memory-subtract" title="Memory Subtract">M−</button>
            <button type="button" class="mem-btn" data-action="memory-store" title="Memory Store">MS</button>
          </div>

          <div class="keypad-grid scientific-panel">
            <button type="button" class="calc-btn fn" data-insert="sin(" title="Sine">sin</button>
            <button type="button" class="calc-btn fn" data-insert="cos(" title="Cosine">cos</button>
            <button type="button" class="calc-btn fn" data-insert="tan(" title="Tangent">tan</button>
            <button type="button" class="calc-btn fn" data-insert="asin(" title="Arc sine">sin⁻¹</button>
            <button type="button" class="calc-btn fn" data-insert="acos(" title="Arc cosine">cos⁻¹</button>
            <button type="button" class="calc-btn fn" data-insert="atan(" title="Arc tangent">tan⁻¹</button>

            <button type="button" class="calc-btn fn" data-insert="log(" title="Log base 10">log</button>
            <button type="button" class="calc-btn fn" data-insert="ln(" title="Natural log">ln</button>
            <button type="button" class="calc-btn fn" data-insert="sqrt(" title="Square root">√</button>
            <button type="button" class="calc-btn fn" data-insert="^" title="Power">x^y</button>
            <button type="button" class="calc-btn fn" data-action="factorial" title="Factorial">n!</button>
            <button type="button" class="calc-btn fn" data-insert="π" title="Pi">π</button>

            <button type="button" class="calc-btn fn" data-insert="e" title="Euler's number">e</button>
            <button type="button" class="calc-btn fn" data-insert="exp(" title="Exponential">exp</button>
            <button type="button" class="calc-btn fn" data-insert="(" title="Open bracket">(</button>
            <button type="button" class="calc-btn fn" data-insert=")" title="Close bracket">)</button>
            <button type="button" class="calc-btn fn" data-action="percent" title="Percentage">%</button>
            <button type="button" class="calc-btn fn" data-action="backspace" title="Backspace">⌫</button>
          </div>

          <div class="keypad-grid main-panel">
            <button type="button" class="calc-btn action" data-action="clear" title="Clear (Esc)">AC</button>
            <button type="button" class="calc-btn action" data-action="clear-entry" title="Clear entry">CE</button>
            <button type="button" class="calc-btn operator" data-insert="/" title="Divide">÷</button>
            <button type="button" class="calc-btn operator" data-insert="*" title="Multiply">×</button>

            <button type="button" class="calc-btn" data-insert="7">7</button>
            <button type="button" class="calc-btn" data-insert="8">8</button>
            <button type="button" class="calc-btn" data-insert="9">9</button>
            <button type="button" class="calc-btn operator" data-insert="-" title="Subtract">−</button>

            <button type="button" class="calc-btn" data-insert="4">4</button>
            <button type="button" class="calc-btn" data-insert="5">5</button>
            <button type="button" class="calc-btn" data-insert="6">6</button>
            <button type="button" class="calc-btn operator" data-insert="+" title="Add">+</button>

            <button type="button" class="calc-btn" data-insert="1">1</button>
            <button type="button" class="calc-btn" data-insert="2">2</button>
            <button type="button" class="calc-btn" data-insert="3">3</button>
            <button type="button" class="calc-btn equals" data-action="equals" title="Equals (Enter)">=</button>

            <button type="button" class="calc-btn wide" data-insert="0">0</button>
            <button type="button" class="calc-btn" data-insert=".">.</button>
          </div>
        </div>

        <p class="keyboard-hint" id="keyboardHint">
          <kbd>Enter</kbd> calculate · <kbd>Esc</kbd> clear · <kbd>H</kbd> history · <kbd>Ctrl+C</kbd> copy
        </p>
      </section>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
